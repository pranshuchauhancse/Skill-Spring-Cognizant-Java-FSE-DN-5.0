<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>

    <!-- Internal CSS -->
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;

            border-radius: 5px;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">
        <h2>Welcome to the Student Portal</h2>
        <p class="highlight">Hello, Student! We are glad to have you here.</p>

        <p>
            Today's
            <span style="color: red; font-weight: bold;">
                Special Offer: Get 20% off on premium courses!
            </span>
        </p>
    </div>

    <p class="highlight">
        Check the latest announcements and upcoming events.
    </p>

</body>
</html>
