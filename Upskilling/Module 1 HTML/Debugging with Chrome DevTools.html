<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debugging with Chrome DevTools</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .box {
            width: 350px;
            margin: 40px auto;
            padding: 20px;
            background-color: lightblue;
            border: 2px solid blue;
            border-radius: 8px;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>

    <script>
        function showMessage() {

            let user = "Student";
            let event = "Workshop";

            console.log("User Name:", user);
            console.log("Selected Event:", event);

            alert("Welcome " + user + " to the " + event + "!");
        }
    </script>

</head>

<body>

    <div class="box">
        <h2>Chrome DevTools Demo</h2>

        <p>Click the button to test JavaScript.</p>

        <button onclick="showMessage()">
            Click Here
        </button>
    </div>

</body>
</html>
