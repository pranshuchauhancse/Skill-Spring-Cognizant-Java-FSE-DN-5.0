<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Inclusion Methods</title>

    <!-- Internal CSS -->
    <style>
        body {
            background-color: #f2f2f2;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="color: red;">Welcome to the Community Portal</h1>

    <h2 class="heading">Upcoming Events</h2>

    <p class="content">
        This page demonstrates inline, internal, and external CSS.
    </p>

</body>
</html>
