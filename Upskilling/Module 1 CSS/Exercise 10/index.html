<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Design</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Community Event Portal</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Events</a>
            <a href="#">Gallery</a>

        </nav>

    <div class="container">

        <div class="card">
            <img src="event.jpg" alt="Community Event">

        <div class="card">
            <img src="event.jpg" alt="Sports Event">

            <p>Enjoy exciting games and activities with your community.</p>
        </div>

    </div>

</html>
