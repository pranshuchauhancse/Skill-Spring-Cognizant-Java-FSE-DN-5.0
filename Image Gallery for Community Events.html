<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>

    <style>
        table {
            border-collapse: collapse;
            margin: 20px auto;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        .event-image {
            width: 180px;
            height: 120px;
            border: 3px solid black;
        }

        caption {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <table>
        <caption>Community Events Gallery</caption>

        <tr>
            <td>
                <img src="event1.jpg" alt="Tree Plantation" title="Tree Plantation Drive" class="event-image">
                <br>Tree Plantation Drive
            </td>

            <td>
                <img src="event2.jpg" alt="Sports Day" title="Annual Sports Day" class="event-image">
                <br>Annual Sports Day
            </td>

            <td>
                <img src="event3.jpg" alt="Cultural Program" title="Cultural Program" class="event-image">
                <br>Cultural Program
            </td>
        </tr>

        <tr>
            <td>
                <img src="event4.jpg" alt="Blood Donation Camp" title="Blood Donation Camp" class="event-image">
                <br>Blood Donation Camp
            </td>

            <td>
                <img src="event5.jpg" alt="Workshop" title="Technology Workshop" class="event-image">
                <br>Technology Workshop
            </td>

            <td>
                <img src="event6.jpg" alt="Community Meeting" title="Community Meeting" class="event-image">
                <br>Community Meeting
            </td>
        </tr>

    </table>

</body>
</html>
